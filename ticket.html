  <title>チケットのお申込み | TATE CORPORATION テイト・コーポレーション</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    .ticket-page {
      font-family: 'Noto Serif JP', serif;
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #f8f4fb 0%, #eee8f3 100%);
    }
    .ticket-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 100%;
      padding: 50px 40px;
      text-align: center;
    }
    .ticket-card-label {
      font-size: 0.85em;
      letter-spacing: 0.3em;
      color: #9b6bb0;
      margin-bottom: 20px;
    }
    .ticket-card h3 {
      font-size: 1.5em;
      font-weight: 500;
      color: #333;
      margin-bottom: 35px;
      letter-spacing: 0.1em;
    }
    .ticket-divider {
      width: 50px;
      height: 1px;
      background: #c9a8d8;
      margin: 0 auto 35px;
    }
    .ticket-tel {
      margin-bottom: 30px;
    }
    .ticket-tel-icon {
      display: inline-block;
      width: 50px;
      height: 50px;
      background: #5b3a6b;
      border-radius: 50%;
      line-height: 50px;
      margin-bottom: 15px;
    }
    .ticket-tel-icon img {
      width: 24px;
      height: 24px;
      vertical-align: middle;
      filter: brightness(10);
    }
    .ticket-tel-number {
      font-size: 2em;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .ticket-tel-hours {
      font-size: 0.9em;
      color: #888;
      letter-spacing: 0.05em;
    }
    .ticket-web {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #ece3f0;
    }
    .ticket-web-icon {
      display: inline-block;
      width: 50px;
      height: 50px;
      background: #9b6bb0;
      border-radius: 50%;
      line-height: 50px;
      margin-bottom: 15px;
    }
    .ticket-web-icon img {
      width: 24px;
      height: 24px;
      vertical-align: middle;
      filter: brightness(10);
    }
    .ticket-web-label {
      font-size: 0.9em;
      color: #888;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .ticket-web-btn {
      display: inline-block;
      background: #9b6bb0;
      color: #fff;
      padding: 14px 50px;
      font-size: 1.1em;
      font-family: 'Noto Serif JP', serif;
      letter-spacing: 0.15em;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s;
    }
    .ticket-web-btn:hover {
      background: #7b4f90;
    }

    /* レスポンシブ対応 */
    @media screen and (max-width: 768px) {
      .headerImages { flex-direction: row; align-items: center; justify-content: flex-start; padding: 0 10px; gap: 8px; }
      .headerImages img { max-width: 100%; height: auto; } .headerImages img:not(.logo) { display: none; }
      .headtertop { flex-wrap: wrap; }
      .headtertop li:first-child { display: none; } .headtertop li { margin: 0 8px; }
      .headtertop li a { height: 40px; font-size: 0.85em; padding: 0 5px; }
      .ticket-page { padding: 30px 15px; }
      .ticket-card { padding: 30px 20px; }
      .ticket-card-label { font-size: 0.8em; }
      .ticket-card h3 { font-size: 1.2em; }
      .ticket-tel-number { font-size: 1.5em; }
      .ticket-tel-hours { font-size: 0.85em; }
      .ticket-web-btn { padding: 12px 30px; font-size: 1em; }
      footer .company { flex-wrap: wrap; justify-content: center; gap: 5px; }
      footer .company li { margin-left: 10px; font-size: 0.85em; }
      .linkbanner.right { flex-wrap: wrap; justify-content: center; gap: 10px; }
      .linkbanner.right img { width: 100px; }
    }
  </style>
</head>

    </ul>

      </li>
      <li>
